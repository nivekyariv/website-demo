<!DOCTYPE html>
<html>
<head>
  <title>Google Sheets Data</title>
</head>
<body>

<h2>Users List</h2>
<ul id="data"></ul>

<script>
fetch("https://opensheet.elk.sh/173PIuFakkuF7ZLn0mlHw8Dg_ZcxDLwxl21g6GB5RO9M/Sheet1")
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById("data");

    data.forEach(row => {
      const li = document.createElement("li");
      li.textContent = row.Name + " - " + row.Email;
      list.appendChild(li);
    });
  });
</script>

</body>
</html>
